<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% seo %}

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/enhancements.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/search-refinements.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/footer-refinements.css' | relative_url }}">

    <!-- Cloudflare Web Analytics -->
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "a4c64c20d749471cbe37cbcf97c57622"}'>
    </script>
    <!-- End Cloudflare Web Analytics -->
  </head>

  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>

    {% include site-nav.html %}

    <section class="display-tools" aria-label="Display and reading options">
      <button class="display-tool-button" type="button" data-large-text-toggle aria-pressed="false">
        Larger text
      </button>

      <button class="display-tool-button" type="button" data-high-contrast-toggle aria-pressed="false">
        High contrast
      </button>

      <button class="display-tool-button" type="button" data-read-page>
        Read aloud
      </button>

      <button class="display-tool-button" type="button" data-stop-reading>
        Stop reading
      </button>
    </section>

    <main id="main-content" class="page-content" aria-label="Content" tabindex="-1">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <div class="wrapper">
        <p>{{ site.description }}</p>
        <p>&copy; {{ site.time | date: '%Y' }} {{ site.author.name | default: site.author }}</p>
      </div>
    </footer>
  </body>
</html>
