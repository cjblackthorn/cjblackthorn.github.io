<nav class="site-menu" aria-label="Main navigation">
  <div class="site-menu-inner">
    <a class="site-menu-brand site-logo-link" href="{{ '/' | relative_url }}" aria-label="Blackthorn Field Notes home">
      <img
        src="{{ '/assets/images/blackthorn-compass-logo-number-4-crop.png' | relative_url }}"
        alt=""
        width="515"
        height="515"
        decoding="async"
        class="site-logo-image"
      >
    </a>

    <input type="checkbox" id="site-menu-toggle" class="site-menu-toggle" aria-hidden="true" tabindex="-1">

    <label
      for="site-menu-toggle"
      class="site-menu-button"
      role="button"
      tabindex="0"
      aria-controls="site-menu-list"
      aria-expanded="false"
      data-site-menu-button>
      <span class="site-menu-icon">☰</span>
      <span>Menu</span>
    </label>

    <ul id="site-menu-list" class="site-menu-list" data-site-menu-list>
      {% for item in site.data.navigation %}
        {% if item.children %}
          <li class="site-menu-item site-menu-has-children">
            <details class="site-menu-details">
              <summary>{{ item.title }}</summary>

              <ul class="site-submenu-list">
                {% for child in item.children %}
                  <li>
                    <a href="{{ child.url | relative_url }}">{{ child.title }}</a>
                  </li>
                {% endfor %}
              </ul>
            </details>
          </li>
        {% else %}
          <li class="site-menu-item">
            <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
          </li>
        {% endif %}
      {% endfor %}
    </ul>
  </div>
</nav>
